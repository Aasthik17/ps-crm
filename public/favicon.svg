<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Navy background -->
  <rect width="64" height="64" rx="10" fill="#1A237E"/>

  <!-- Ashoka Chakra: outer ring -->
  <circle cx="32" cy="32" r="18" stroke="#FF9933" stroke-width="2.5" fill="none"/>

  <!-- Ashoka Chakra: inner hub -->
  <circle cx="32" cy="32" r="4" fill="#FF9933"/>

  <!-- 24 spokes -->
  <g stroke="#FF9933" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="28" x2="32" y2="14.5"/>
    <line x1="32" y1="36" x2="32" y2="49.5"/>
    <line x1="28" y1="32" x2="14.5" y2="32"/>
    <line x1="36" y1="32" x2="49.5" y2="32"/>
    <!-- Diagonals (45°) -->
    <line x1="29.17" y1="29.17" x2="19.39" y2="19.39"/>
    <line x1="34.83" y1="34.83" x2="44.61" y2="44.61"/>
    <line x1="34.83" y1="29.17" x2="44.61" y2="19.39"/>
    <line x1="29.17" y1="34.83" x2="19.39" y2="44.61"/>
    <!-- 22.5° spokes -->
    <line x1="30.43" y1="28.24" x2="24.33" y2="15.15"/>
    <line x1="33.57" y1="35.76" x2="39.67" y2="48.85"/>
    <line x1="28.24" y1="33.57" x2="15.15" y2="39.67"/>
    <line x1="35.76" y1="30.43" x2="48.85" y2="24.33"/>
    <line x1="33.57" y1="28.24" x2="39.67" y2="15.15"/>
    <line x1="30.43" y1="35.76" x2="24.33" y2="48.85"/>
    <line x1="35.76" y1="33.57" x2="48.85" y2="39.67"/>
    <line x1="28.24" y1="30.43" x2="15.15" y2="24.33"/>
    <!-- 67.5° spokes -->
    <line x1="29.17" y1="28.24" x2="21.61" y2="16.02"/>
    <line x1="34.83" y1="35.76" x2="42.39" y2="47.98"/>
    <line x1="35.76" y1="29.17" x2="47.98" y2="21.61"/>
    <line x1="28.24" y1="34.83" x2="16.02" y2="42.39"/>
    <line x1="34.83" y1="29.17" x2="42.39" y2="16.02"/>
    <line x1="29.17" y1="34.83" x2="21.61" y2="47.98"/>
    <line x1="28.24" y1="29.17" x2="16.02" y2="21.61"/>
    <line x1="35.76" y1="34.83" x2="47.98" y2="42.39"/>
  </g>

  <!-- India green bottom band -->
  <rect x="0" y="56" width="64" height="8" rx="0" fill="#138808"/>
  <rect x="0" y="56" width="64" height="8" rx="0" fill="#138808"/>
  <!-- Saffron top band -->
  <rect x="0" y="0" width="64" height="8" rx="0" fill="#FF6B00"/>
  <rect x="0" y="0" width="64" height="8" rx="10" fill="#FF6B00"/>
  <!-- Re-clip corners of bands -->
  <rect x="0" y="54" width="64" height="10" rx="0" fill="#138808"/>
  <rect x="0" y="56" width="64" height="8" fill="#138808"/>
  <path d="M0 56 H64 V60 Q64 64 60 64 H4 Q0 64 0 60 Z" fill="#138808"/>
  <path d="M0 8 H64 V4 Q64 0 60 0 H4 Q0 0 0 4 Z" fill="#FF6B00"/>
</svg>
